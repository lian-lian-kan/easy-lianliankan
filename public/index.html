<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>连连看 - H5游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: var(--app-height, 100dvh);
            display: flex;
            align-items: center;
            justify-content: center;
            padding:
                max(20px, env(safe-area-inset-top))
                max(20px, env(safe-area-inset-right))
                max(20px, env(safe-area-inset-bottom))
                max(20px, env(safe-area-inset-left));
            overflow-y: auto;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #1f2937; margin-bottom: 16px; }
        p { color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
        .browser-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .browser {
            text-align: center;
        }
        .browser-icon { font-size: 32px; margin-bottom: 4px; }
        .browser-name { font-size: 12px; color: #6b7280; }
        .btn {
            display: inline-block;
            background: #7c3aed;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn:hover { background: #6d28d9; }
        .supported { color: #10b981; font-weight: 600; }
        .unsupported { color: #ef4444; font-weight: 600; }
        #status { margin: 20px 0; padding: 16px; border-radius: 8px; }
        #status.supported { background: #d1fae5; }
        #status.unsupported { background: #fee2e2; }
        @media (orientation: landscape) and (max-height: 560px) {
            body { align-items: flex-start; }
            .card {
                padding: 24px;
                border-radius: 16px;
            }
            .icon {
                font-size: 48px;
                margin-bottom: 12px;
            }
            .browser-list {
                gap: 12px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎮</div>
        <h1>连连看 H5</h1>
        <div id="status">正在检测浏览器兼容性...</div>

        <div id="supported-content" style="display: none;">
            <p class="supported">✅ 您的浏览器支持 WebGL！</p>
            <p>正在进入游戏...</p>
        </div>

        <div id="unsupported-content" style="display: none;">
            <p class="unsupported">❌ 您的浏览器不支持 WebGL</p>
            <p>该游戏需要 WebGL 支持。请使用以下现代浏览器：</p>

            <div class="browser-list">
                <div class="browser">
                    <div class="browser-icon">🌐</div>
                    <div class="browser-name">Chrome 57+</div>
                </div>
                <div class="browser">
                    <div class="browser-icon">🦊</div>
                    <div class="browser-name">Firefox 51+</div>
                </div>
                <div class="browser">
                    <div class="browser-icon">🧭</div>
                    <div class="browser-name">Safari 15+</div>
                </div>
                <div class="browser">
                    <div class="browser-icon">🌊</div>
                    <div class="browser-name">Edge 16+</div>
                </div>
            </div>

            <p style="font-size: 14px; color: #9ca3af;">
                如果您使用的是上述浏览器但仍看到此提示，请尝试：<br>
                1. 更新浏览器到最新版本<br>
                2. 在浏览器设置中启用"硬件加速"<br>
                3. 更新显卡驱动程序
            </p>
        </div>
    </div>

    <script>
        function syncViewportHeight() {
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.documentElement.style.setProperty('--app-height', `${Math.round(viewportHeight)}px`);
        }
        syncViewportHeight();
        window.addEventListener('resize', syncViewportHeight, { passive: true });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncViewportHeight, { passive: true });
        }
        window.addEventListener('orientationchange', () => {
            setTimeout(syncViewportHeight, 120);
        }, { passive: true });

        function checkWebGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                return gl !== null;
            } catch (e) {
                return false;
            }
        }

        function checkWasm() {
            return typeof WebAssembly === 'object';
        }

        function isSecureContextForH5() {
            if (window.isSecureContext) return true;
            return ['localhost', '127.0.0.1'].includes(window.location.hostname);
        }

        const statusEl = document.getElementById('status');
        const supportedContent = document.getElementById('supported-content');
        const unsupportedContent = document.getElementById('unsupported-content');

        const hasWebGL = checkWebGL();
        const hasWasm = checkWasm();
        const isSecure = isSecureContextForH5();

        if (hasWebGL && hasWasm) {
            statusEl.className = 'supported';
            statusEl.textContent = isSecure
                ? '✅ 环境检测通过'
                : '⚠️ 环境检测通过（建议 HTTPS）';
            supportedContent.style.display = 'block';

            // Redirect to game after 1.5 seconds
            setTimeout(() => {
                window.location.href = './godot/index.html';
            }, 1500);
        } else {
            statusEl.className = 'unsupported';
            if (!hasWasm) {
                statusEl.textContent = '❌ 浏览器不支持 WebAssembly';
            } else {
                statusEl.textContent = '❌ 浏览器不支持 WebGL';
            }
            unsupportedContent.style.display = 'block';
        }
    </script>
</body>
</html>
